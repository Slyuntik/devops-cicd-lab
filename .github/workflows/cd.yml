name: CD Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed
    branches: [main]

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: staging
    steps:
      - name: Get commit SHA from CI
        run: |
          COMMIT_SHA=${{ github.event.workflow_run.head_sha }}
          echo "COMMIT_SHA=${COMMIT_SHA}" >> $GITHUB_ENV
      
      - name: Simulate staging deployment
        run: |
          echo "Deploying ghcr.io/${{ github.repository }}:sha-${COMMIT_SHA:0:7}"
          echo "Deployment to staging successful"

  smoke-test:
    needs: deploy-staging
    runs-on: ubuntu-latest
    steps:
      - name: Simulate smoke test
        run: |
          echo "Running smoke tests against staging"
          echo "All smoke tests passed"

  deploy-production:
    needs: smoke-test
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: production
    steps:
      - name: Get commit SHA from CI
        run: |
          COMMIT_SHA=${{ github.event.workflow_run.head_sha }}
          echo "COMMIT_SHA=${COMMIT_SHA}" >> $GITHUB_ENV
      
      - name: Simulate production deployment
        run: |
          echo "Deploying ghcr.io/${{ github.repository }}:sha-${COMMIT_SHA:0:7} to production"
          echo "Deployment successful after manual approval"